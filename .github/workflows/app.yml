name: App CI/CD

on:
  push:
    branches: ["main", "staging", "dev"]
    paths:
      - 'src/**'
  pull_request:
    branches: ["main", "staging", "dev"]
    paths:
      - 'src/**'  
  workflow_dispatch:
    inputs:
      environment:
        description: "Entorno a desplegar (dev/staging/prod)"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - staging
          - prod
permissions:
  contents: read
  security-events: write 

jobs:
  # ──────────────────────────────────────────────
  # JOB 1: Detección de secretos (Gitleaks)
  # ──────────────────────────────────────────────
  secrets-scan:
    name: Secrets Scan (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Gitleaks - detectar secretos
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ──────────────────────────────────────────────────────────────
  # JOB 2: Análisis estático de código (Semgrep)
  # Escanea el código fuente buscando vulnerabilidades y malos
  # patrones de programación ANTES de construir la imagen.
  # Se habilita cuando se vea DevSecOps en clase.
  # ──────────────────────────────────────────────────────────────
  code-scan:
    name: Code Scan (Semgrep)
    runs-on: ubuntu-latest
    needs: secrets-scan
    container:
      image: semgrep/semgrep
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Semgrep
        run: semgrep scan --config=auto --sarif --output=semgrep-results.sarif ./src
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

      - name: Upload Semgrep SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: semgrep-results.sarif


  # ──────────────────────────────────────────────
  # JOB 3: Build y push a ECR
  # ──────────────────────────────────────────────
  build-and-push:
    if: github.event_name != 'pull_request'
    name: Build & Push to ECR
    runs-on: ubuntu-latest
    needs: code-scan  # Habilitar cuando se active el job de Semgrep
    strategy:
      matrix:
        service: [ui, catalog, cart, checkout, orders, admin]

    env:
      AWS_REGION: us-east-1

    outputs:
      environment: ${{ steps.set-env.outputs.environment }}
      registry: ${{ steps.login-ecr.outputs.registry }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Determinar entorno
        id: set-env
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "environment=${{ github.event.inputs.environment }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.ref_name }}" = "main" ]; then
            echo "environment=prod" >> $GITHUB_OUTPUT
          elif [ "${{ github.ref_name }}" = "staging" ]; then
            echo "environment=staging" >> $GITHUB_OUTPUT
          else
            echo "environment=dev" >> $GITHUB_OUTPUT
          fi


      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag y push de imagen
        id: build
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ENV: ${{ steps.set-env.outputs.environment }}
          # El repo ECR incluye el entorno en el nombre para separar ambientes
          ECR_REPO: retailstore-${{ steps.set-env.outputs.environment }}-${{ matrix.service }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          IMAGE_URI="$REGISTRY/$ECR_REPO:$IMAGE_TAG"

          docker build \
            --label "git.sha=${{ github.sha }}" \
            --label "git.branch=${{ github.ref_name }}" \
            --label "build.date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            -t "$REGISTRY/$ECR_REPO:$IMAGE_TAG" \
            -t "$REGISTRY/$ECR_REPO:latest" \
          ./src/${{ matrix.service }}

          docker push "$REGISTRY/$ECR_REPO:$IMAGE_TAG"
          docker push "$REGISTRY/$ECR_REPO:latest"

          # Exportar el registry para el trivy
          echo "registry=$REGISTRY" >> $GITHUB_OUTPUT







  # ──────────────────────────────────────────────
  # JOB 4: Scan de imagen con Trivy
  # ──────────────────────────────────────────────
  image-scan:
    
    name: Image Scan (Trivy)
    runs-on: ubuntu-latest
    needs: build-and-push
    strategy:
      matrix:
        service: [ui, catalog, cart, checkout, orders, admin]

    env:
      AWS_REGION: us-east-1

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ needs.build-and-push.outputs.registry }}/retailstore-${{ needs.build-and-push.outputs.environment }}-${{ matrix.service }}:${{ github.sha }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: '0'  # NO FALLA si hay findings
          ignore-unfixed: true

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif


  # ──────────────────────────────────────────────
  # JOB 5: Deploy en ECS
  # ──────────────────────────────────────────────
  deploy:
    name: Deploy to ECS
    runs-on: ubuntu-latest
    needs: [build-and-push, image-scan]
    strategy:
      matrix:
        service: [ui, catalog, cart, checkout, orders, admin]


    env:
      AWS_REGION: us-east-1

    environment:
      name: ${{ needs.build-and-push.outputs.environment }}
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2    

      - name: Deploy nueva imagen en ECS
